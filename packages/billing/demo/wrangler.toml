# 0xNIMBUS — Billing Worker Wrangler Config
# Deploy the billing agent as a standalone Worker.
# Uses default workers.dev domain; add agent.moikapy.dev later via
# Cloudflare dashboard → Workers & Pages → Custom domains.
# Build entrypoint: worker.ts

name = "nimbus-agent"
main = "worker.ts"
compatibility_date = "2025-04-10"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"
remote = true

[[d1_databases]]
binding = "DB"
database_name = "nimbus-billing"
# ⬇️ Replace after: wrangler d1 create nimbus-billing
database_id = "baf285d7-591a-4848-be8d-f21c613e5473"

[[durable_objects.bindings]]
name = "BillingChatAgent"
class_name = "BillingChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BillingChatAgent"]

[vars]
# Placeholder — set real domain after you add it in Cloudflare
UPGRADE_URL = "https://nimbus-chat.pages.dev/pricing"

# Secrets: wrangler secret put STRIPE_SECRET_KEY
# Secrets: wrangler secret put STRIPE_WEBHOOK_SECRET
# Secrets: wrangler secret put STRIPE_PRICE_PRO
# Secrets: wrangler secret put STRIPE_PRICE_PREMIER
