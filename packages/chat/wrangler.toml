/**
 * 0xNIMBUS — Chat Pages Wrangler Config
 *
 * Deploy the Next.js chat app to Cloudflare Pages.
 * Domain: chat.moikapy.dev (custom domain)
 */

name = "nimbus-chat"
compatibility_date = "2025-04-10"
compatibility_flags = ["nodejs_compat"]

# Build output directory for Pages
pages_build_output_dir = ".vercel/output/static"

[vars]
NEXT_PUBLIC_AGENT_URL = "https://agent.moikapy.dev"

# Secrets (set via `wrangler pages secret put`):
# CLERK_SECRET_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_PRO
# STRIPE_PRICE_PREMIER
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (public, set as env var)
